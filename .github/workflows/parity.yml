name: Parity Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  parity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run parity
        run: npm run parity

      - name: Upload parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parity-artifacts
          path: |
            docs/harness/parity/latest-run.json
            docs/harness/parity/latest-compare.json
          if-no-files-found: error
